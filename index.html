<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Akan Name Generator</title>
    <link rel ="stylesheet" href="style.css">

</head>
<body>
    <main class="container">
    
        <header>
    <h1>Akan name Generator</h1>
    <p>Discover your Ghanian traditional name based on the day of the week you were born.this akan name helps you discover your Akan name bsed on your birth date and gender.It is the ghanain tradition where children are often named.</p>
        </header>

<section class="form-card"> 
    <form id="Akan-form">
        <div class="input-group">
        <label for="birthday">Enter your birthdate:</label>
        <input type="date" id="birthdayrequired"><br><br>
        </div>
        
            <!-- gender input -->
        <label>Select gender:</label>
        <div class="radio-options">
        <input type="radio" name="gender" value="male">Male
        <input type="radio" name="gender" value="female">female<br><br>
        </div>
    
        <!-- submit button -->

        <button type="submit"id=submit-button>generate name</button>
    </form>
</section>
<!-- result section -->

<section id="result-display" class="result-section">
    <p id="displayname"> Your Akan name will appear hear:</p>
</section>
    </main>

    
    
</body>
</html>
